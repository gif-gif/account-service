services:
  service:
    stdin_open: true  # -i
    tty: true         # -t
    build:
      context: ./service
      dockerfile: Dockerfile
    env_file:
      - ${SERVICE_ENV_FILE:-.env.local}
    ports:
      - "${HTTP_PORT:-8000}:${HTTP_PORT:-8000}"
    volumes:
      - ./app/logs:/app/logs
      - ./app/aws-sso-cache:/app/.aws/sso/cache
      - ./app/cache:/app/.cache
      - ./app/config:/app/.config
      - ./app/local-share:/app/.local/share
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file:
      - ${SERVICE_ENV_FILE:-.env.local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - account_postgres_data:/var/lib/postgresql/data

volumes:
  account_postgres_data:
