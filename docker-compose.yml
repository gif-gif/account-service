services:
  service:
    build:
      context: ./service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8000}:${HTTP_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-account}
      POSTGRES_USER: ${POSTGRES_USER:-account}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-account}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-account} -d ${POSTGRES_DB:-account}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - account_postgres_data:/var/lib/postgresql/data

volumes:
  account_postgres_data:
